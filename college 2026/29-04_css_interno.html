<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style> /*Interno*/
        h1{
            color:#2c3e50;
            text-align: center; 
        }
        p{ /*Tudo que esta entre chaves considera-se que é uma lista */ 
            color:#555;
            font-size: 16px;
            margin: 20px;
        }
        body{
            background-color:#f0f0f0;
            font-family: Arial,sans-serif;
        }
    </style>
    <title>CSS interno</title>
</head>
<body>
    <h1>Minha primeira página com CSS Interno</h1>
    <p>Este parágrafo foi estilizado usando CSS interno dentro da tag style no cabeçalho do HTML</p>

</body>
</html>
